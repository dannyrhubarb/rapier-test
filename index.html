<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Rapier 2D</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#14141e">
  <!-- iOS home screen support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rapier 2D">
  <link rel="apple-touch-icon" href="./icon-180.png">
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #14141e; }
    canvas { display: block; width: 100vw; height: 100vh; }

    #touch-controls {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      pointer-events: none;
    }

    #thrust-btn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.4);
      pointer-events: all;
      touch-action: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      user-select: none;
    }
    #thrust-btn.active {
      background: rgba(255, 200, 0, 0.4);
      border-color: rgba(255, 200, 0, 0.8);
    }

    #torque-area {
      pointer-events: all;
      touch-action: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #torque-track {
      width: 180px;
      height: 70px;
      border-radius: 35px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.4);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #torque-knob {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      position: absolute;
      transition: background 0.1s;
    }
    #torque-track.active #torque-knob {
      background: rgba(255, 200, 0, 0.8);
      transition: none;
    }
  </style>
</head>
<body>
  <canvas id="glcanvas" tabindex="1"></canvas>

  <div id="touch-controls">
    <div id="thrust-btn">THRUST</div>
    <div id="torque-area">
      <div id="torque-track">
        <div id="torque-knob"></div>
      </div>
    </div>
  </div>

  <script src="./mq_js_bundle.js"></script>
  <script>
    function call(name, ...args) {
      if (typeof wasm_exports !== "undefined" && wasm_exports[name]) {
        wasm_exports[name](...args);
      }
    }

    // Thrust button
    const thrustBtn = document.getElementById("thrust-btn");
    thrustBtn.addEventListener("touchstart", e => {
      e.preventDefault();
      thrustBtn.classList.add("active");
      call("set_touch_thrust", 1);
    }, { passive: false });
    thrustBtn.addEventListener("touchend", () => {
      thrustBtn.classList.remove("active");
      call("set_touch_thrust", 0);
    });
    thrustBtn.addEventListener("touchcancel", () => {
      thrustBtn.classList.remove("active");
      call("set_touch_thrust", 0);
    });

    // Torque knob
    const torqueTrack = document.getElementById("torque-track");
    const torqueKnob = document.getElementById("torque-knob");
    const MAX_DRAG = 60; // px from center = full torque

    torqueTrack.addEventListener("touchstart", e => {
      e.preventDefault();
      torqueTrack.classList.add("active");
    }, { passive: false });

    torqueTrack.addEventListener("touchmove", e => {
      e.preventDefault();
      const rect = torqueTrack.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const dx = e.touches[0].clientX - cx;
      const clamped = Math.max(-MAX_DRAG, Math.min(MAX_DRAG, dx));
      const normalized = clamped / MAX_DRAG;
      torqueKnob.style.transform = `translateX(${clamped}px)`;
      call("set_touch_torque", normalized);
    }, { passive: false });

    torqueTrack.addEventListener("touchend", () => {
      torqueTrack.classList.remove("active");
      torqueKnob.style.transform = "translateX(0)";
      call("set_touch_torque", 0);
    });
    torqueTrack.addEventListener("touchcancel", () => {
      torqueTrack.classList.remove("active");
      torqueKnob.style.transform = "translateX(0)";
      call("set_touch_torque", 0);
    });

    load("./rapier-test.wasm");
  </script>
</body>
</html>
